name: iOS Automation Test

on:
  workflow_dispatch:

jobs:
  ios-test:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Appium
        run: |
          npm install -g appium

      - name: Install XCUITest Driver
        run: |
          appium driver install xcuitest

      - name: Start Appium
        run: |
          appium > appium.log 2>&1 &
          sleep 15

      - name: Run iOS Tests
        run: |
          pytest tests/ios \
            --html=reports/html/ios_report.html \
            --self-contained-html

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-report
          path: reports/html/

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-appium-log
          path: appium.log